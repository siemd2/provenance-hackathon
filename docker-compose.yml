services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Optional: enables Claude-written anomaly explanations. Falls back to
      # built-in templates when unset, so the demo works offline.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Lightweight sqlite store, created on startup. The verifier itself is stateless;
      # this wires a real database through DATABASE_URL without any external service.
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./provenance.db}

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
