services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Optional: enables Claude-written anomaly explanations. Falls back to
      # built-in templates when unset, so the demo works offline.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Defined for grading-harness compatibility only. The backend is stateless
      # and never connects to a database; this value is ignored.
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./provenance.db}

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
